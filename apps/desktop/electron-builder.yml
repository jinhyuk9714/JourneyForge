appId: com.journeyforge.desktop
productName: JourneyForge
asar: true
npmRebuild: false

directories:
  output: release

files:
  - out/**
  - package.json
  - node_modules/**
  - '!src/**'
  - '!e2e/**'
  - '!e2e-real/**'
  - '!e2e-execution-real/**'
  - '!playwright*.config.ts'
  - '!scripts/**'

mac:
  category: public.app-category.developer-tools
  identity: null
  target:
    - dmg
    - zip

artifactName: ${productName}-${version}-${arch}.${ext}
