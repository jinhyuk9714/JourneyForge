<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JourneyForge Demo Target</title>
    <style>
      :root {
        color: #1f2937;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f1ea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(239, 68, 68, 0.08), transparent 35%),
          radial-gradient(circle at right center, rgba(59, 130, 246, 0.1), transparent 30%),
          #f6f1ea;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 20px 72px;
      }

      .panel {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(31, 41, 55, 0.1);
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(31, 41, 55, 0.08);
        padding: 28px;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
      }

      input {
        width: 100%;
        border: 1px solid rgba(31, 41, 55, 0.14);
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 16px;
      }

      button,
      a.button-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 0;
        border-radius: 14px;
        padding: 12px 18px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      button.primary {
        background: #111827;
        color: #fff;
      }

      .results {
        display: grid;
        gap: 12px;
        margin-top: 20px;
      }

      .product-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 18px;
        padding: 16px 18px;
        background: #fff;
        border: 1px solid rgba(31, 41, 55, 0.08);
      }

      .muted {
        color: rgba(31, 41, 55, 0.65);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel stack">
        <header>
          <p class="muted">JourneyForge verification target</p>
          <h1>Demo Commerce App</h1>
        </header>
        <div id="app"></div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
  </html>
