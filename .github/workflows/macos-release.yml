name: macOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release when dispatching from a branch
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release-macos:
    runs-on: macos-latest
    env:
      CSC_NAME: ${{ vars.CSC_NAME || secrets.CSC_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release tag and desktop version
        id: release_meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
        run: node apps/desktop/scripts/prepare-mac-release-ci.mjs

      - name: Import Developer ID certificate
        shell: bash
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${CSC_NAME:-}" ]]; then
            echo "::error::Set CSC_NAME as a repository variable or secret before running the macOS release workflow."
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/journeyforge-build-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/journeyforge-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '"')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Materialize App Store Connect API key
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

          {
            echo "APPLE_API_KEY=$API_KEY_PATH"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"

      - name: Run repository verification
        run: |
          set -euo pipefail
          pnpm check-types
          pnpm build
          pnpm test
          pnpm --filter @journeyforge/desktop test:e2e
          pnpm --filter @journeyforge/desktop test:smoke-real
          pnpm --filter @journeyforge/desktop test:smoke-execution-real
          pnpm --filter @journeyforge/desktop test:package-smoke

      - name: Build signed and notarized macOS release
        run: pnpm --filter @journeyforge/desktop package:mac

      - name: Verify signed release artifacts
        run: pnpm --filter @journeyforge/desktop notarize:mac:verify

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(
            apps/desktop/release/JourneyForge-*.dmg
            apps/desktop/release/JourneyForge-*.zip
            apps/desktop/release/JourneyForge-*.dmg.blockmap
            apps/desktop/release/JourneyForge-*.zip.blockmap
          )

          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "::error::No release assets were produced under apps/desktop/release."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --title "JourneyForge ${RELEASE_VERSION}" \
              --generate-notes \
              --verify-tag
          fi
